name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "41 6 * * 1"  # weekly, Monday 06:41 UTC

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    name: Dependency vulnerability scan (pip-audit)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.12"
      # --extra validator: `dev` covers release+parquet+studio but NOT the advertised
      # [validator] extra; install it too (the runner's 3.12 satisfies its >=3.12 marker)
      # so focus-validator and its transitive deps are inside the audited environment.
      - run: uv sync --frozen --extra dev --extra validator
      - name: Audit installed dependencies
        # No documented exceptions: the lock resolves pyarrow >= 23.0.1 (currently 25.x), which
        # fixes PYSEC-2026-113, so the previous `--ignore-vuln PYSEC-2026-113` is no longer needed.
        # pip-audit is pinned so the vulnerability gate is reproducible (a new pip-audit release
        # cannot silently change or break the scan); bump deliberately alongside the other pins.
        run: uv run --with pip-audit==2.10.1 pip-audit

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0  # scan the full history
          persist-credentials: false
        # v3 is the Node 24 runtime migration (v2 was Node 20, unsupported after GitHub's
        # 2026-06-16 cutoff). Free for this personal/public repo — no GITLEAKS_LICENSE required.
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}

  workflow-lint:
    name: Lint workflows (actionlint + zizmor + pinning)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.12"
      - name: actionlint (pinned download script + release)
        env:
          ACTIONLINT_SHA: 03d0035246f3e81f36aed592ffb4bebf33a03106  # v1.7.7
          ACTIONLINT_VERSION: 1.7.7
        run: |
          curl -sSfL "https://raw.githubusercontent.com/rhysd/actionlint/${ACTIONLINT_SHA}/scripts/download-actionlint.bash" -o download-actionlint.bash
          bash download-actionlint.bash "${ACTIONLINT_VERSION}"
          ./actionlint -color
      - name: zizmor (workflow security audit)
        run: uvx zizmor@1.27.0 --offline .github/workflows
      - name: All actions pinned to a full SHA (project policy)
        run: python3 scripts/check_pinned_actions.py

  dependency-review:
    name: Dependency review (PR)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # dependency-review-action diffs base..head, so it only runs on pull_request events; this
    # workflow also runs on push/schedule, where the action would error — guard it so the job is
    # skipped (not failed) there. Requires the repository Dependency Graph (now enabled).
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Review dependency changes for known-vulnerable versions
        # Complements pip-audit: pip-audit scans the *installed* Linux/py3.12 environment, while
        # this gates the PR's dependency diff against the GitHub Advisory DB across the full locked
        # graph — incl. platform/version-conditional packages (e.g. Windows-only tzdata) the
        # single-platform install never exercises — ahead of Dependabot's post-merge alert.
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high        # aligned with the repo's Trivy HIGH/CRITICAL posture
          comment-summary-in-pr: never  # no PR comment -> no pull-requests: write needed
