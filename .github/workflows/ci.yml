name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; no job here needs more than read access.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check src tests scripts

  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.11"
      - run: uv sync --frozen --extra dev
      - run: uv run mypy

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    env:
      UV_PYTHON: ${{ matrix.python }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync --frozen --extra dev
      # Windows + Linux both run the default suite (atomic writes / paths differ by OS);
      # the coverage floor is enforced via [tool.coverage.report].fail_under.
      - run: uv run pytest -q --cov=focus_data_toolkit --cov-report=term-missing

  package:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
      - run: uv sync --frozen --extra dev
      - name: Build wheel + sdist
        run: uv run python -m build
      - name: Validate distribution metadata
        run: uv run twine check dist/*
      - name: Build/install/smoke the distribution (packaging suite)
        run: uv run pytest -m packaging -q

  actions-pinned:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: All third-party GitHub Actions are pinned to a full commit SHA
        run: python3 scripts/check_pinned_actions.py
