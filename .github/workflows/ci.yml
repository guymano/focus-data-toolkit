name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; no job here needs more than read access.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.12"
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check src tests scripts

  typecheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.11"
      - run: uv sync --frozen --extra dev
      - run: uv run mypy

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025]
        python: ["3.11", "3.12", "3.13"]
        include:
          # Single macOS smoke combo: the wheel is pure Python and PyPI advertises
          # "OS Independent", so one macOS run (POSIX paths/symlinks + the native PyArrow
          # wheel) is proportionate; a full macOS matrix is not.
          - os: macos-15
            python: "3.13"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    env:
      UV_PYTHON: ${{ matrix.python }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync --frozen --extra dev
      # Windows + Linux both run the default suite (atomic writes / paths differ by OS);
      # the coverage floor is enforced via [tool.coverage.report].fail_under.
      - run: uv run pytest -q --cov=focus_data_toolkit --cov-report=term-missing

  package:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.12"
      - run: uv sync --frozen --extra dev
      - name: Build wheel + sdist
        run: uv run python -m build
      - name: Validate distribution metadata
        run: uv run twine check dist/*
      - name: Build/install/smoke the distribution (packaging suite)
        run: uv run pytest -m packaging -q
      - name: Smoke - the [all] extra resolves and installs (fresh venv, Python 3.12)
        # `[all]` (parquet + validator + studio) is advertised but was never installed by any
        # workflow; the runner's Python 3.12 satisfies focus-validator's >=3.12 marker.
        run: |
          python3 -m venv /tmp/all-venv
          whl="$(ls dist/*.whl)"
          /tmp/all-venv/bin/pip install --quiet "${whl}[all]"
          /tmp/all-venv/bin/focus-toolkit version
          test -x /tmp/all-venv/bin/focus-validator

  actions-pinned:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: All third-party GitHub Actions are pinned to a full commit SHA
        run: python3 scripts/check_pinned_actions.py
