name: Reproducibility check

# Builds the distribution twice with a fixed SOURCE_DATE_EPOCH and compares hashes. The wheel is
# byte-for-byte reproducible and is asserted as a hard gate; the sdist's file *contents* are
# reproducible but its tar PAX-header mtime is not normalized by SOURCE_DATE_EPOCH, so the sdist
# comparison is reported (not failed). See docs/releasing.md for the documented limitation.
#
# The build procedure mirrors release-build.yml exactly (same locked toolchain, same hash-pinned
# backend, --no-isolation) so what this check proves reproducible is the build the release
# actually ships — not a differently-resolved local build.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  double-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.12"
      - name: Install locked toolchain (tools only — no project build before the backend gate)
        run: uv sync --frozen --extra dev --no-install-project
      - name: Fixed build timestamp
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"
      - name: Install the locked build backend (exact version + hashes)
        run: uv pip install --require-hashes -r constraints/build-backend.txt
      - name: Build twice (locked backend, no isolation — same procedure as release-build.yml)
        run: |
          uv run --no-sync python -m build --no-isolation --outdir out1
          uv run --no-sync python -m build --no-isolation --outdir out2
      - name: Compare (wheel is a hard gate; sdist is reported)
        run: |
          set -euo pipefail
          wa="$(sha256sum out1/*.whl | cut -d' ' -f1)"
          wb="$(sha256sum out2/*.whl | cut -d' ' -f1)"
          sa="$(sha256sum out1/*.tar.gz | cut -d' ' -f1)"
          sb="$(sha256sum out2/*.tar.gz | cut -d' ' -f1)"
          {
            echo "## Reproducibility (SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH)";
            echo "| artifact | build A | build B | identical |";
            echo "| --- | --- | --- | --- |";
            echo "| wheel | \`${wa:0:16}\` | \`${wb:0:16}\` | $([ "$wa" = "$wb" ] && echo yes || echo NO) |";
            echo "| sdist | \`${sa:0:16}\` | \`${sb:0:16}\` | $([ "$sa" = "$sb" ] && echo yes || echo 'no (PAX mtime, documented)') |";
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$wa" != "$wb" ]; then
            echo "::error::wheel is not byte-for-byte reproducible ($wa != $wb)"; exit 1
          fi
          if [ "$sa" != "$sb" ]; then
            echo "::warning::sdist bytes differ (tar PAX-header mtime); file contents are identical — see docs/releasing.md"
          fi
