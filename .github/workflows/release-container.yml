name: Release container

# Publish the Runner image to GHCR on a protected, signed `v*` tag:
#   gate -> build (candidate, not pushed) -> scan -> push release tags -> SBOM -> attest -> sign.
# Mirrors the PyPI release posture: SHA-pinned actions, least-privilege per job, and a GitHub
# Environment (`ghcr`) that the owner configures with required reviewers (see docs/releasing.md).
# The image is scanned BEFORE any public tag is assigned, and the same release gates as
# release.yml (tag == package version; provenance honesty) run before anything is built or pushed,
# so a rejected release never publishes an image.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment:
      name: ghcr
    permissions:
      contents: read
      packages: write        # push the image to GHCR
      id-token: write        # cosign keyless + provenance attestation (OIDC)
      attestations: write    # record the GitHub Artifact Attestation
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Release gates - tag matches version; provenance honesty
        id: gate
        env:
          TAG: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import json, os, pathlib, re, sys

          tag = os.environ["TAG"]
          version = re.search(
              r'__version__\s*=\s*"([^"]+)"',
              pathlib.Path("src/focus_data_toolkit/_version.py").read_text(encoding="utf-8"),
          ).group(1)
          if tag != f"v{version}":
              sys.exit(f"tag {tag!r} does not match package version 'v{version}'")

          # Same honesty gate as release.yml: a final (non PEP-440-pre-release) version must not
          # publish while the model provenance is still 'partial'.
          status = json.load(
              open("src/focus_data_toolkit/model/model_provenance.json", encoding="utf-8")
          )["provenance_status"]
          is_prerelease = bool(re.search(r"(?:a|b|rc)\d+", version)) or ".dev" in version
          if status != "complete" and not is_prerelease:
              sys.exit(
                  f"model provenance is {status!r} but {version!r} is a final version: publish a "
                  "PEP 440 pre-release (aN/bN/rcN/.devN), or complete provenance first."
              )
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"version={version}\n")
          print(f"gates OK: {tag} / provenance {status!r}")
          PY

      - name: Compute tags/labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE }}
          # No moving `latest`. PEP 440 so pre-release tags (v0.10.0rc1) still produce a version
          # tag; metadata-action omits the major.minor alias for pre-releases automatically.
          flavor: latest=false
          tags: |
            type=pep440,pattern={{version}}
            type=pep440,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=long

      - name: Build candidate image (loaded locally, not pushed)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          push: false
          provenance: false
          tags: focus-data-toolkit:candidate
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.gate.outputs.version }}
            REVISION=${{ github.sha }}

      - name: Vulnerability scan BEFORE publishing (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: focus-data-toolkit:candidate
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push the scanned image under the release tags; capture digest
        id: push
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker tag focus-data-toolkit:candidate "$tag"
            docker push "$tag"
          done <<< "$TAGS"
          first="$(printf '%s\n' "$TAGS" | head -n1)"
          repo_digest="$(docker inspect --format='{{index .RepoDigests 0}}' "$first")"
          digest="${repo_digest##*@}"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "published ${IMAGE}@${digest}"

      - name: SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.IMAGE }}@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.image.cdx.json
          upload-release-assets: false

      - name: Attest build provenance for the image
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign the image (keyless OIDC)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
