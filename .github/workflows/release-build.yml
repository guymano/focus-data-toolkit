name: Release build (reusable)

# Reusable build-once workflow: build the wheel + sdist, test them, generate a CycloneDX SBOM and
# SHA256SUMS, record a build manifest, and run the offline release verifier. The SAME artifacts are
# then consumed (by digest) by the dry-run and the real release — nothing downstream rebuilds.
#
# It performs NO publishing and requests NO write/id-token scopes; attest + publish live in the
# caller (release.yml) so the build stage can never accidentally publish.

on:
  workflow_call:
    outputs:
      version:
        description: The built package version.
        value: ${{ jobs.build.outputs.version }}
      artifact:
        description: The name of the uploaded release artifact.
        value: release-dist

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          python-version: "3.12"
      - name: Install locked toolchain (tools only — no project build before the backend gate)
        # --no-install-project: a plain sync would build/install the project itself through
        # an unpinned PEP 517 backend resolution BEFORE the hash-locked backend below is in
        # place. Tools first, then the pinned backend, and only then anything that builds
        # the project.
        run: uv sync --frozen --extra dev --no-install-project

      - name: Pin build timestamp to the commit (reproducible builds)
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      - name: Install the locked build backend (exact version + hashes)
        run: uv pip install --require-hashes -r constraints/build-backend.txt

      - name: Build wheel + sdist (locked backend, no isolation)
        # --no-isolation so the hash-verified backend installed above is the one that builds;
        # an isolated build would re-resolve setuptools unpinned from the index. --no-sync so
        # uv run cannot trigger its own project build behind the gate.
        run: uv run --no-sync python -m build --no-isolation

      - name: Install the built wheel (the exact artifact under test)
        run: uv pip install --no-deps dist/*.whl

      - name: Validate distribution metadata
        run: uv run --no-sync twine check dist/*

      - name: Test the built distribution
        run: uv run --no-sync pytest -m packaging -q

      - name: Read version
        id: version
        run: |
          v="$(uv run --no-sync python -c 'import focus_data_toolkit as f; print(f.__version__)')"
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Generate CycloneDX SBOMs (declared ranges + uv.lock-resolved profile)
        run: |
          for whl in dist/*.whl; do
            uv run --no-sync python scripts/generate_sbom.py "$whl" -o dist/sbom.cdx.json
            uv run --no-sync python scripts/generate_resolved_sbom.py "$whl" -o dist/sbom.resolved.cdx.json
          done

      - name: Stage the provenance manifests as release assets
        # Model, official-JSON-schema and provider-adapter provenance travel with the dists
        # (they also ship inside the wheel) so each is attested and downloadable per release.
        run: |
          cp src/focus_data_toolkit/model/model_provenance.json dist/
          cp src/focus_data_toolkit/model/json_schemas/json_schemas_provenance.json dist/
          cp src/focus_data_toolkit/supplement/adapters/adapters_provenance.json dist/

      - name: Record build manifest (toolchain + commit + ref)
        env:
          COMMIT: ${{ github.sha }}
          REF: ${{ github.ref }}
        run: |
          uv run --no-sync python - <<'PY'
          import importlib.metadata as md
          import json
          import os
          import platform

          def ver(pkg):
              try:
                  return md.version(pkg)
              except md.PackageNotFoundError:
                  return None

          manifest = {
              "commit": os.environ.get("COMMIT"),
              "ref": os.environ.get("REF"),
              "source_date_epoch": os.environ.get("SOURCE_DATE_EPOCH"),
              "python": platform.python_version(),
              "platform": platform.platform(),
              "runner": "ubuntu-24.04",
              "build_backend": {
                  "requirement": "constraints/build-backend.txt (hash-locked, --no-isolation)",
                  "setuptools": ver("setuptools"),
              },
              "tool_versions": {p: ver(p) for p in ("build", "twine")},
          }
          with open("dist/release-manifest.json", "w", encoding="utf-8") as fh:
              json.dump(manifest, fh, indent=2, sort_keys=True)
              fh.write("\n")
          print(json.dumps(manifest, indent=2, sort_keys=True))
          PY

      - name: Generate SHA256SUMS over all artifacts
        run: |
          cd dist
          sha256sum ./*.whl ./*.tar.gz sbom.cdx.json sbom.resolved.cdx.json \
            release-manifest.json model_provenance.json json_schemas_provenance.json \
            adapters_provenance.json > SHA256SUMS
          cat SHA256SUMS

      - name: Verify release (offline gate)
        run: uv run --no-sync python scripts/verify_release.py --dist dist --no-hints

      - name: Upload release artifacts (passed downstream by digest)
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: release-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7
