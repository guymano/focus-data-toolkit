name: OpenSSF Scorecard

# Supply-chain posture *indicator* (branch protection, pinned deps, token permissions, ...).
# A green Scorecard is a signal, not a guarantee of security.
#
# Scorecard publishes results to the OpenSSF (public repos only) and uploads SARIF to code
# scanning (needs GitHub Advanced Security on private repos). Until the repo is public with code
# scanning enabled (Ops step, see docs/releasing.md), the auto-run triggers are commented out so
# this workflow does not fail; run it manually to test, and restore the triggers below then.
on:
  workflow_dispatch:
  # branch_protection_rule:
  # schedule:
  #   - cron: "13 5 * * 1"  # weekly, Monday 05:13 UTC
  # push:
  #   branches: [main]

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-24.04
    permissions:
      # A job-level permissions block replaces the top-level one entirely (unset scopes become
      # `none`), so `contents: read` must be restated for actions/checkout to read the repo.
      contents: read
      security-events: write  # upload SARIF to code scanning
      id-token: write         # publish results to the OpenSSF REST API (public repos)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif
