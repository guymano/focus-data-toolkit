name: OpenSSF Scorecard

# Supply-chain posture *indicator* (branch protection, pinned deps, token permissions, ...).
# A green Scorecard is a signal, not a guarantee of security.
#
# Scorecard publishes results to the OpenSSF (public repositories) and uploads SARIF to code
# scanning. Requires code scanning to be enabled in the repository settings — see
# docs/releasing.md.
on:
  workflow_dispatch:
  branch_protection_rule:
  schedule:
    - cron: "13 5 * * 1"  # weekly, Monday 05:13 UTC
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      # A job-level permissions block replaces the top-level one entirely (unset scopes become
      # `none`), so `contents: read` must be restated for actions/checkout to read the repo.
      contents: read
      security-events: write  # upload SARIF to code scanning
      id-token: write         # publish results to the OpenSSF REST API (public repos)
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@2d1146689b8cda280b9bc96326124645441f03bc # v2.4.4
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: results.sarif
