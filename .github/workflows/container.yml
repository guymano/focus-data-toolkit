name: Container

# Build the Runner image and exercise it end to end on every PR / push to main — WITHOUT
# publishing anything (that is release-container.yml, on a v* tag). Named volumes are used
# throughout so the non-root container can write without host bind-mount permission issues.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# The build + 600k-row SIGTERM smoke is the heaviest PR job — don't let superseded pushes of
# the same ref run it twice in parallel.
concurrency:
  group: container-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image (load into the local daemon, no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          push: false
          tags: focus-data-toolkit:ci
          build-args: |
            VERSION=ci
            REVISION=${{ github.sha }}

      - name: Smoke - version + parquet extra available
        run: |
          out="$(docker run --rm focus-data-toolkit:ci version)"
          echo "$out"
          echo "$out" | grep -q "focus-data-toolkit "
          echo "$out" | grep -q "parquet: available"

      - name: Smoke - runs as non-root (uid 65532)
        run: |
          uid="$(docker run --rm --entrypoint sh focus-data-toolkit:ci -c 'id -u')"
          echo "uid=$uid"
          [ "$uid" = "65532" ]

      - name: Generate a source into a named volume
        run: |
          docker run --rm -v fdt-src:/work focus-data-toolkit:ci \
            generate --provider aws --focus-version 1.3 --rows 200 --seed 5 --out /work/gen

      - name: Smoke - read-only rootfs + volumes, streaming Parquet convert
        run: |
          docker run --rm --read-only --tmpfs /tmp \
            -v fdt-src:/input:ro -v fdt-out:/output -v fdt-work:/work \
            focus-data-toolkit:ci \
            convert --cost-and-usage /input/gen/focus_1_3_cost_and_usage_aws.csv \
              --stream --output-format parquet --out /output/result \
              --mode synthetic --exit-policy pipeline
          docker run --rm -v fdt-out:/output --entrypoint sh focus-data-toolkit:ci \
            -c 'test -f /output/result/focus_1_4_manifest.json && test -f /output/result/SHA256SUMS && echo OK'

      - name: Smoke - exit codes (strict incomplete -> 3; pipeline -> 0)
        run: |
          set +e
          docker run --rm -v fdt-src:/input:ro -v fdt-out:/output -v fdt-work:/work \
            focus-data-toolkit:ci \
            convert --cost-and-usage /input/gen/focus_1_3_cost_and_usage_aws.csv --out /output/r-strict
          code=$?; echo "strict exit=$code"; [ "$code" = "3" ] || exit 1
          docker run --rm -v fdt-src:/input:ro -v fdt-out:/output -v fdt-work:/work \
            focus-data-toolkit:ci \
            convert --cost-and-usage /input/gen/focus_1_3_cost_and_usage_aws.csv --out /output/r-pipe \
              --exit-policy pipeline
          code=$?; echo "pipeline exit=$code"; [ "$code" = "0" ] || exit 1

      - name: Smoke - SIGTERM is handled (not SIGKILLed; clean cancel leaves no output)
        run: |
          docker run --rm -v fdt-big:/work focus-data-toolkit:ci \
            generate --provider aws --focus-version 1.3 --rows 600000 --seed 5 --out /work/gen
          cid="$(docker run -d --read-only --tmpfs /tmp \
            -v fdt-big:/input:ro -v fdt-outbig:/output -v fdt-workbig:/work \
            focus-data-toolkit:ci \
            convert --cost-and-usage /input/gen/focus_1_3_cost_and_usage_aws.csv \
              --stream --output-format parquet --out /output/result --mode synthetic --progress)"
          # Stop only once the conversion has observably started (first --progress output),
          # instead of racing a fixed sleep against a fast runner — this makes the signal
          # path deterministic: every green run actually exercised SIGTERM.
          for _ in $(seq 1 60); do
            [ "$(docker inspect -f '{{.State.Running}}' "$cid")" = "true" ] || break
            [ -n "$(docker logs "$cid" 2>&1 | head -c 1)" ] && break
            sleep 1
          done
          docker stop --time 30 "$cid" >/dev/null
          code="$(docker inspect -f '{{.State.ExitCode}}' "$cid")"
          docker rm "$cid" >/dev/null 2>&1 || true
          echo "post-SIGTERM exit=$code"
          case "$code" in
            130)
              # Cancelled cleanly — nothing must have been published.
              docker run --rm -v fdt-outbig:/output --entrypoint sh focus-data-toolkit:ci \
                -c 'if [ -e /output/result ]; then echo "partial output published"; ls -R /output; exit 1; fi; echo "no partial output"'
              ;;
            0|3|4)
              # The run completed before the stop landed, so SIGTERM handling was NOT exercised.
              # A green check must prove the cancel path — fail loudly instead of passing
              # silently; if this ever triggers, raise --rows above.
              echo "inconclusive: run finished before SIGTERM landed (exit $code); increase --rows"; exit 1
              ;;
            137)
              echo "container ignored SIGTERM (SIGKILLed after the grace period)"; exit 1
              ;;
            *)
              echo "unexpected container exit code $code (broken image / error path)"; exit 1
              ;;
          esac

      - name: Vulnerability scan (trivy, fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: focus-data-toolkit:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
