name: Release dry-run

# Rehearsal of the release build. It calls the reusable build-once workflow and re-verifies
# the produced artifacts, but requests NO publish/attestation scopes, uses NO environment, and
# publishes nothing. Use it to exercise the pipeline on any branch before cutting a tag.
#
# Separation from the real release is structural (a distinct workflow with no id-token/publish),
# not a boolean flag — a dry-run cannot become a publish.
#
# Besides the manual dispatch, it runs automatically on PRs that touch release-relevant files,
# so a change that breaks the locked build chain is caught at PR time instead of at the next
# tag. Deliberately NOT a required check: a paths-filtered required check would block every PR
# that does not touch these paths.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/release-build.yml"
      - ".github/workflows/release.yml"
      - ".github/workflows/release-container.yml"
      - ".github/workflows/release-dry-run.yml"
      - "constraints/**"
      - "scripts/verify_release.py"
      - "scripts/generate_sbom.py"
      - "scripts/generate_resolved_sbom.py"
      - "pyproject.toml"
      - "MANIFEST.in"
      - "uv.lock"
      - "src/focus_data_toolkit/_version.py"
      - "CHANGELOG.md"

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/release-build.yml

  verify:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.artifact }}
          path: dist
      - name: Re-verify the built release (offline)
        run: python3 scripts/verify_release.py --dist dist
      - name: Summary
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          {
            echo "## Release dry-run for \`$VERSION\`";
            echo "Built, tested, SBOM + SHA256SUMS generated and verified. **Nothing was published.**";
            echo "Artifacts:";
            echo '```';
            ls -1 dist;
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"
