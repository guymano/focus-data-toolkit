name: Release

# Real release, triggered only by a protected, signed `v*` tag. It reuses the build-once workflow,
# then attests and publishes the SAME artifacts (passed by digest — never rebuilt):
#
#   build (no privileges) -> attest (GitHub Artifact Attestations) -> publish (PyPI Trusted Publishing)
#
# id-token / attestations / publish scopes are granted ONLY to the jobs that need them, and the
# publish job runs in the `pypi` environment (add required reviewers there — see docs/releasing.md).
# Operational prerequisites (PyPI Trusted Publisher, environment, tag protection) are owner-only and
# documented in docs/releasing.md; until they exist a tag push will fail at publish rather than leak.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/release-build.yml

  attest:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write        # keyless signing (OIDC)
      attestations: write    # record the attestation
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.artifact }}
          path: dist
      - name: Attest build provenance for every artifact
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
            dist/sbom.cdx.json
            dist/sbom.resolved.cdx.json
            dist/release-manifest.json
            dist/model_provenance.json
            dist/json_schemas_provenance.json
            dist/adapters_provenance.json
            dist/SHA256SUMS

  publish:
    needs: [build, attest]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment:
      name: pypi
      url: https://pypi.org/p/focus-data-toolkit
    permissions:
      id-token: write        # PyPI Trusted Publishing (OIDC) — no long-lived token
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.artifact }}
          path: dist
      - name: Tag matches built version
        env:
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          if [ "$TAG" != "v$VERSION" ]; then
            echo "tag '$TAG' does not match built version 'v$VERSION'"; exit 1
          fi
      - name: Honesty gate — partial model provenance publishes only pre-releases
        # docs/model-provenance.md: a release presenting fully reproducible model provenance
        # requires provenance_status = "complete"; anything else must be a pre-release. On
        # PyPI that means a PEP 440 pre-release/dev version — a final version with partial
        # provenance is refused here, before anything is uploaded.
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import sys

          status = json.load(open("dist/model_provenance.json"))["provenance_status"]
          version = os.environ["VERSION"]
          is_prerelease = bool(re.search(r"(?:a|b|rc)\d+", version)) or ".dev" in version
          if status != "complete" and not is_prerelease:
              sys.exit(
                  f"model provenance is {status!r} but {version!r} is a final version: "
                  "publish a PEP 440 pre-release (aN/bN/rcN/.devN), or complete the "
                  "provenance first (scripts/verify_model_provenance.py --complete)."
              )
          print(f"provenance {status!r} / version {version!r}: OK to publish")
          PY
      - name: Stage only the distributable files for PyPI
        run: |
          mkdir -p dist-pypi
          cp dist/*.whl dist/*.tar.gz dist-pypi/
          ls -1 dist-pypi
      - name: Publish to PyPI (Trusted Publishing + PEP 740 attestations)
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          packages-dir: dist-pypi

  github-release:
    # Persistent, attested asset set on the tag itself — workflow artifacts expire after 7
    # days; the GitHub Release keeps the dists, both SBOM profiles, SHA256SUMS, the build
    # manifest and the three provenance manifests permanently downloadable. Depends on
    # `publish` so the tag/version check, the provenance gate and the pypi environment
    # approval have all passed before any release appears — a failed or rejected publish
    # never leaves a GitHub Release behind.
    needs: [build, attest, publish]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write        # create the release on the tag
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.artifact }}
          path: dist
      - name: Extract release notes from CHANGELOG
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          python3 - <<'PY'
          import os
          import re
          import sys

          version = os.environ["VERSION"]
          text = open("CHANGELOG.md", encoding="utf-8").read()
          match = re.search(
              r"^##\s*\[" + re.escape(version) + r"\][^\n]*\n(.*?)(?=^##\s*\[|\Z)",
              text,
              re.MULTILINE | re.DOTALL,
          )
          if not match:
              sys.exit(f"CHANGELOG.md has no '[{version}]' section")
          with open("release-notes.md", "w", encoding="utf-8") as fh:
              fh.write(match.group(1).strip() + "\n")
          PY
      - name: Honesty gate — mark the release as pre-release while provenance is partial
        run: |
          status="$(python3 -c 'import json; print(json.load(open("dist/model_provenance.json"))["provenance_status"])')"
          echo "PROVENANCE_STATUS=$status" >> "$GITHUB_ENV"
          if [ "$status" != "complete" ]; then
            {
              echo "";
              echo "> **Model provenance: \`$status\`.** Published as a pre-release per";
              echo "> docs/model-provenance.md: the FOCUS model's source workbook hash is not";
              echo "> yet archived, so end-to-end model reproducibility is not claimed.";
            } >> release-notes.md
          fi
      - name: Create the GitHub Release with the attested assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          assets=(
            dist/*.whl dist/*.tar.gz dist/sbom.cdx.json dist/sbom.resolved.cdx.json
            dist/SHA256SUMS dist/release-manifest.json dist/model_provenance.json
            dist/json_schemas_provenance.json dist/adapters_provenance.json
          )
          prerelease=()
          if [ "$PROVENANCE_STATUS" != "complete" ]; then
            prerelease=( --prerelease )
          fi
          # Idempotent: if a release for this tag already exists — e.g. the tag was created from the
          # GitHub "Draft a new release" UI, which also creates the release — update it in place and
          # attach the attested assets instead of failing; otherwise create it fresh (verifying the
          # tag exists, for the plain `git push` tag path).
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "focus-data-toolkit $VERSION" --notes-file release-notes.md "${prerelease[@]}"
            gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber "${assets[@]}"
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --verify-tag \
              --title "focus-data-toolkit $VERSION" --notes-file release-notes.md \
              "${prerelease[@]}" "${assets[@]}"
          fi
