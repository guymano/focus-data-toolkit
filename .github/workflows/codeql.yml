name: CodeQL

# CodeQL uploads results to GitHub code scanning, which requires the repository to be public (or
# GitHub Advanced Security on a private repo). Until that Ops step is done, the auto-run triggers
# are commented out so this workflow does not fail CI; run it manually to test. Restore the
# triggers below once the repo is public with code scanning enabled (see docs/releasing.md).
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]
  # schedule:
  #   - cron: "27 4 * * 1"  # weekly, Monday 04:27 UTC

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-24.04
    permissions:
      security-events: write  # upload results to code scanning
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # Analyze the Python source and the GitHub Actions workflows.
        language: [python, actions]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
