version: 2
updates:
  # GitHub Actions — keep the SHA pins current (Dependabot updates the pin + the version comment).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
    open-pull-requests-limit: 5

  # Python dependencies (pyproject extras + the uv.lock).
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      python-dev:
        dependency-type: development
      python-runtime:
        dependency-type: production
    open-pull-requests-limit: 5
