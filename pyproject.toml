[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "focus-data-toolkit"
version = "0.2.0"
description = "Generate provider-realistic FOCUS 1.2/1.3 sample data (AWS, Azure, GCP) and convert it to the four FOCUS 1.4 datasets, with built-in conformance validation."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
keywords = ["finops", "focus", "billing", "cost", "sample-data"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Office/Business :: Financial",
]
# The core toolkit is standard-library only.
dependencies = []

[project.optional-dependencies]
# The official FinOps FOCUS validator (not published on PyPI in a recent
# version; installed from GitHub). Requires Python >= 3.12.
validator = [
    "focus_validator @ git+https://github.com/finopsfoundation/focus_validator",
]
dev = ["pytest>=8", "ruff>=0.6"]

[project.scripts]
focus-toolkit = "focus_data_toolkit.cli:main"

[project.urls]
Homepage = "https://github.com/guymano/focus-data-toolkit"
Issues = "https://github.com/guymano/focus-data-toolkit/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"focus_data_toolkit.model" = ["*.json"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
